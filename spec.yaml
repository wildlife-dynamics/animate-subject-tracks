id: animate_tracks
requirements:
  - name: ecoscope-workflows-core
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: pydeck
    version: 0.9.2
    channel: conda-forge

  - name: ecoscope-workflows-ext-custom
    version: "0.0.58.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ste
    version: "0.0.22.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "0.0.7.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-big-life
    version: "0.0.8.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mep
    version: "0.0.29.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

rjsf-overrides:
  properties:
    Subject Group.properties.subject_group_var.properties.var.title: Subject Group Name
    Subject Group.properties.subject_group_var.properties.var.default: Elephants
    trips_view_state.properties.pitch.default: 0
task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

workflow:
  # set workflow details
  - name: Set workflow details
    id: workflow_details
    task: set_workflow_details

  - name: Connect to EarthRanger
    id: er_client_name
    task: set_er_connection 

  # define time range
  - name: Define analysis time range
    id: time_range
    task: set_time_range

  # set groupers -- limiting this to subject_name
  - name: Configure grouping strategy
    id: groupers
    task: set_groupers
    partial:
      groupers: []

  - title: Subject Group
    type: task-group
    description: Choose subject group to generate collar voltage charts and overall speedmap
    tasks:
      - name: Set subject group name
        id: subject_group_var
        task: set_string_var

  - name: Get subject group observations
    id: subject_observations
    task: get_subjectgroup_observations
    partial:
      filter: clean
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      subject_group_name: ${{ workflow.subject_group_var.return }} 
      raise_on_empty: false
      include_details: true
      include_subjectsource_details: true

  - title: EarthRanger Spatial Features
    type: task-group
    description: >-
      Optionally overlay EarthRanger spatial feature layers (e.g. protected areas, reporting
      zones) on the animated map. Enable the toggle to turn this on.
    tasks:
      - name: null
        id: er_client_for_spatial_features
        task: gate_earthranger_client
        partial:
          client: ${{ workflow.er_client_name.return }}

      - name: Include earthranger spatial features
        id: include_er_feature
        task: get_mep_spatial_features
        partial:
          client: ${{ workflow.er_client_for_spatial_features.return }}

      - name: Create spatial features layer
        id: er_spatial_layer
        task: create_spatial_features_layer
        partial:
          geodataframe: ${{ workflow.include_er_feature.return }}

  - name: Transform observations to relocations
    id: subject_reloc
    task: process_relocations
    partial:
      observations: ${{ workflow.subject_observations.return }}
      relocs_columns:
        - groupby_col
        - fixtime
        - junk_status
        - geometry
        - extra__subject__name
        - extra__subject__hex
        - extra__subject__sex
        - extra__created_at
        - extra__subject__subject_subtype
        - extra__subjectsource__id
        - extra__subjectsource__assigned_range
        - extra__observation_details

      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Convert relocations to trajectories 
    id: convert_to_trajs 
    task: relocations_to_trajectory 
    partial: 
      relocations: ${{ workflow.subject_reloc.return }}

  - name: Standardize trajectory column names
    id: rename_traj_cols
    task: map_columns 
    partial:
      raise_if_not_found: false
      df: ${{ workflow.convert_to_trajs.return }}
      drop_columns: []
      retain_columns: [] 
      rename_columns:
        extra__hex: hex_color
        extra__name: subject_name
        extra__sex: subject_sex
        extra__subject_subtype: subject_subtype
        extra__created_at: created_at

  - name: Save relocations to GeoParquet
    id: persist_relocs_geoparquet
    task: persist_df 
    partial: 
      df: ${{ workflow.subject_reloc.return }}
      filetype: geoparquet 
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: relocations

  - name: Save trajectories to GeoParquet
    id: persist_trajs_geoparquet
    task: persist_df 
    partial: 
      df: ${{ workflow.rename_traj_cols.return }}
      filetype: geoparquet 
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: trajectories

  - name: Configure terrain elevation decoder
    id: terrain_exaggeration
    task: create_elevation_decoder
    partial:
      r_scaler: 256
      g_scaler: 1.0
      b_scaler: 0.00390625 #1/256
      offset: -32768.0

  - name: Configure Tilelayers
    id: custom_basemap_urls
    task: set_custom_basemap_urls

  - name: Configure basemap
    id: basemap_option
    task: set_basemap_option
    partial:
      basemap:
        preset: default
        elevation_decoder: ${{ workflow.terrain_exaggeration.return }}
        tile_urls: ${{ workflow.custom_basemap_urls.return }}

  - name: Prepare trajectory animation data
    id: trajs_trips
    task: trajectory_to_trips
    partial:
      trajectory_gdf: ${{ workflow.rename_traj_cols.return }}
      subject_name_col: subject_name
      subject_hex_col: hex_color
      terrain:
        zoom: 15
        offset: 30
        cache_dir: null
        ground_elevation: 1500
        basemap: ${{ workflow.basemap_option.return }}

  - name: Create terrain layer
    id: terrain_layer
    task: create_terrain_layer
    partial:
      min_zoom: 0
      max_zoom: 15
      basemap: ${{ workflow.basemap_option.return }}
      wireframe: false

  - name: Calculate map view bounds
    id: trips_view_state
    task: compute_view_state_from_gdf
    partial:
      gdf: ${{ workflow.trajs_trips.return }}
  
  - name: Normalize animation timestamps
    id: normalize_trips 
    task: normalize_timestamps 
    partial: 
      target_span: null 
      df: ${{ workflow.trajs_trips.return }}

  - name: Create trips layer 
    id: trips_layer 
    task: create_trips_layer 
    partial: 
      geodataframe: ${{ workflow.normalize_trips.return }}
      data_url: null 
      layer_style: 
        get_timestamps: timestamps 
        get_color: color 
        get_width: 2.15
        width_units: pixels 
        width_scale: 1
        width_min_pixels: 1
        width_max_pixels : 5
        cap_rounded: true
        joint_rounded: true 
        billboard: false 
        fade_trail: true 
        current_time: 0 
        trail_length: 120
      legend: 
        title: Subjects 
        label_column: name 
        color_column: color
        sort: ascending 
        label_suffix: null 
  
  - name: Configure animation settings
    id: animation_settings
    task: create_timeline_animation
    partial:
      fade_ratio: 1.00
      fps_limit: 30
      show_history: true
      history_color: [255, 255, 255]
      head_outline_color:  [255, 255, 255]
      history_opacity: 1.00
      fade_history: true
      show_head: true
      # head_radius: 2.25
      head_color: null
      # head_outline_width: 1.05
      auto_rotate_speed: 0.0

  - name: Append optional ER spatial layer
    id: static_map_layers
    task: append_optional_layer
    skipif:
      conditions: []
    partial:
      base_layers: []
      optional_layer: ${{ workflow.er_spatial_layer.return }}

  - name: Combine spatial layers with grouped layers
    id: combined_bse_layers
    task: combine_deckgl_map_layers
    partial:
      static_layers: ${{ workflow.static_map_layers.return }}
      grouped_layers: ${{ workflow.trips_layer.return }}

  - name: Draw animated map
    id: draw_animation
    task: draw_animated_map
    partial:
      geo_layers: ${{ workflow.combined_bse_layers.return }}
      tile_layers:
        - ${{ workflow.terrain_layer.return }}
      static: false
      max_zoom: 15
      title: null
      legend_style:
        placement: "bottom-right"
      view_state: ${{ workflow.trips_view_state.return }}
      animation: ${{ workflow.animation_settings.return }}

  - name: Save animated map as HTML
    id: map_urls
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_animation.return }}
      filename: animated_map.html

  - title: Video Creation
    type: task-group
    description: >-
      Optionally render the animated map as a video file.
      Enable the toggle to turn on video creation.
    tasks:
      - name: Configure video export
        id: video_output_path
        task: configure_video_export
        partial: 
          filename: ${{ workflow.map_urls.return }}

      - name: Render animation video
        id: create_animation
        task: render_animation
        skipif:
          conditions:
            - any_dependency_skipped
        partial:
          html_path: ${{ workflow.video_output_path.return }}
          output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          out_path: "animation.mp4"
          fps: 30
          # duration:
          #   auto: false
          #   seconds: 60.0
          device_scale_factor: 1
          gl: auto
          workers: 1
          capture_format: jpeg
          jpeg_quality: 92
          settle_ms: 30
          settle_timeout_ms: 8000
          head_ready_timeout_ms: 30000
          crf: 18
          x264_preset: veryfast
          start_frac: 0.0
          end_frac: 1.0
          verbose: true
      
    # Map widgets
  - name: Create animated map widget
    id: animated_map_widget
    task: create_map_widget_single_view
    partial:
      title: "Subject movements"
      data: ${{ workflow.map_urls.return }}

  - name: Generate Dashboard
    id: animate_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return }}
      widgets:
        - ${{ workflow.animated_map_widget.return }}
      time_range: ${{ workflow.time_range.return }}
      groupers: ${{ workflow.groupers.return }}